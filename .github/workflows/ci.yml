name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  broken-links:
    name: Broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check for broken links
        run: npx --yes mint broken-links
